<p>起案者の中谷さんは大学進学で上京し、東京R不動産を経て浜松にUターン。商店街から地元を盛り上げようとカフェ経営を始め、その後も旅行会社やシェアオフィスの運営を手がけていた。
  静岡県天竜のローカル線の無人駅の駅舎を一日一組限定ホテルにリノベーションするこのプロジェクトは、「地方でもこんなかっこいいことができる」という問いかけが全国の共感を呼び、地方創生の新しいモデルケースとなった。
  現在は浜松市から<a href="https://www.city.hamamatsu.shizuoka.jp/hamact/office/tenryu-trialoffice.html" target="_blank" rel="noopener">天竜トライアルオフィス</a>の運営を受託している浜松のキーマンである。</p>
