<p>UUUM社との連携プロジェクトで、UUUMクリエイター全体に「クラウドファンディングでやりたいこと」をアンケート実施。当時UUUM所属の<a href="https://www.youtube.com/user/hittyaso" target="_blank" rel="noopener">ハイサイ探偵団</a>（現在チャンネル登録者数125万人）の当プロジェクトが採択されて実施した。当時UUUM社はオンラインストア「MUUU」を立ち上げ、クリエイターのグッズ販売を開始しており、そのPRを兼ねてのプロジェクトとなった。鎌田和樹社長を交えた商談となり、かなり緊張した覚えがある。</p>
