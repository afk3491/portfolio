<p><a href="https://aimadonna.com/" target="_blank" rel="noopener">愛☆まどんな</a>（現代美術家）× <a href="https://yamada-reiji.com/" target="_blank" rel="noopener">山田玲司</a>（漫画家）× <a href="https://stoke.co.jp/" target="_blank" rel="noopener">柿内芳文</a>（編集者）による「アートコミックス」という新ジャンルへの挑戦。印刷費だけでは大赤字になるとのことで、展覧会を交えた企画にすることに。</p>
<p>2019年GW中に秋葉原で開催した白亜展は大盛況となった。『嫌われる勇気』を手がけた編集者が率いる狂気のプロジェクトとして、企画や展示設営、イベント運営などにも携わり、当時のCAMPFIRE代表が巨大作品を買い取るというドラマが発生した。</p>
