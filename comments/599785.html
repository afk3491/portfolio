<p>電通社員で<a href="https://www.moto-eigakan.com/museum" target="_blank" rel="noopener">元映画館</a>を運営していた高橋窓太郎さんと、現代美術家の<a href="https://www.mahokubota.com/ja/artists/2276/" target="_blank" rel="noopener">安井鷹之介</a>さんから相談があり、プロジェクトに。東日本大震災によって建てられた巨大な防波堤の壁面に安井さんが壁画を描き、負の遺産ではなく逆に美術館として観光資産にしようという試み。支援者には壁画の所有権（作品証明書）を付与するなど、ユニークなリターンを企画した。</p>
<p>1回目の挑戦は他社で行い、地元の方々とトラブルになり中止になったが、電通を辞めて雄勝町に移り住むという高橋さんの本気が地元の方々の心を動かした。</p>
