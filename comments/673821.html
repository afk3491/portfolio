<p>写真家の上田優紀さんが初めてCFにチャレンジしてくれたのは<a href="https://camp-fire.jp/projects/165151" target="_blank" rel="noopener">2019年</a>だった。その際はスポンサーは既に付いていたが知名度も低く目標金額に届かなかった。誰も観たことのない風景を撮るために危険を省みず難所にチャレンジする彼の目は少年のようだった。その後の写真はSNSで大きな話題となり、どんどん有名になっていった。</p>
<p>この2回目のCFでは目標金額を大きく上回る資金を集めた。彼の挑戦に勇気づけられた方や彼のファインダーが捉えた風景に魅せられた人は多い。私もその1人だ。</p>
