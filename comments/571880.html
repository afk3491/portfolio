<p><a href="https://www.tiktok.com/@gensho_yasuda" target="_blank" rel="noopener">TikTok250万フォロワー</a>を誇るアニメ作家・安田現象さんの初長編映画『メイク ア ガール』制作支援プロジェクト。2018年中頃からVTuber事務所に一斉に営業を掛けていた結果、事務所を独立された方からこのプロジェクトの相談が舞い込んだ。</p>
<p>アニメIPに関する仕事をされていた経験から、従来の製作委員会方式を避け、クリエイターの世界観を守るために安田現象さんのための少人数スタジオを作り、映画作品を支援者に届けるまでサポートするという決意が込められていた。SNS世代のクリエイターエコノミーを体現し、継続して<a href="https://camp-fire.jp/projects/698036" target="_blank" rel="noopener">第二弾</a>も実施していただいた。</p>
