<p>堀江貴文さん率いるインターステラテクノロジズの入社前に実施されていた<a href="https://camp-fire.jp/projects/7166" target="_blank" rel="noopener">前回プロジェクト</a>を会社として撮影することになり、北海道大樹町に弾丸撮影へ。天候が悪くロケット打ち上げの予定を翌日に変更したものの、結局本番の打ち上げも失敗してしまった。しかし撮影班が機転を利かし、ロケットを見上げる地元の子供達にフォーカスした動画を撮影した。先方にも動画の完成を非常に喜んでもらえ、その後、継続的にプロジェクトを実施していただいている。</p>
