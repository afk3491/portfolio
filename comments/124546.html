<p>ステージ4乳がんを宣告された中島ナオさんと、元NHK職員で「注文をまちがえる料理店」のプロデューサーの<a href="https://x.com/oguni_deleteC" target="_blank" rel="noopener">小国士朗</a>さん、子宮頸癌を罹患した経験もある医療研究センター研究員の長井陽子さんが中心となって立ち上げた「がんを治せる病気にする」プロジェクト。</p>
<p>「企業ロゴからCを消す」というビジュアルアクションでがん治療研究への関心を喚起する仕組みを構築し、ForbesやHUFFPOSTなどに多数掲載された。</p>
